apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: component-architect-backend
        metrics_path: /metrics
        static_configs:
          - targets:
              - backend-service:8000
      - job_name: otel-collector
        metrics_path: /metrics
        static_configs:
          - targets:
              - otel-collector-service:9464
