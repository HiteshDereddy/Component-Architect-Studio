apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-worker
  labels:
    app: ml-worker
spec:
  replicas: 1 # This is dynamically scaled by the HPA
  selector:
    matchLabels:
      app: ml-worker
  template:
    metadata:
      labels:
        app: ml-worker
    spec:
      containers:
      - name: worker
        image: my-registry/component-architect-worker:latest
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        resources:
          requests:
            cpu: 1000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi
            # If you deploy to EKS with GPUs, you would uncomment this
            # nvidia.com/gpu: 1
